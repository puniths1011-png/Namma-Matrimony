kind = "web"
previewPath = "/"
title = "Shaadi Matrimonial App"
version = "1.0.0"
id = "artifacts/shaadi-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24013

[services.development]
run = "pnpm --filter @workspace/shaadi-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shaadi-app", "run", "build" ]
publicDir = "artifacts/shaadi-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24013"
BASE_PATH = "/"
